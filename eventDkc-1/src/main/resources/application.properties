spring.application.name=eventDkc-1

# Pour que le téléphone puisse joindre le backend : écouter sur toutes les interfaces
server.address=0.0.0.0

spring.datasource.url=jdbc:mysql://localhost:3306/eventDkc?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

